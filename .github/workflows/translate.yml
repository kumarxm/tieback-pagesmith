name: Translate Pagesmith Content

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/pages/**/*.astro'
      - 'src/pages/**/*.md'
      - 'src/pages/**/*.mdx'
      - 'src/content/**/*.md'
      - 'src/content/**/*.mdx'
      - '!src/pages/de/**'
      - '!src/pages/fr/**'
      - '!src/content/de/**'
      - '!src/content/fr/**'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install deepl-node gray-matter

      - name: Git Pull Latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main

      - name: Run translation script
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: node Scripts/translate.js

      - name: Commit and Push
        run: |
          # Stage the new folders
          git add src/pages/de/ src/pages/fr/ src/content/de/ src/content/fr/ 2>/dev/null || true
          
          if ! git diff --cached --quiet; then
            git commit -m "chore(i18n): update localized pages and content [automated]"
            git push origin main
          else
            echo "Nothing new to commit."
          fi
